<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asma's Service Manager Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --indigo: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --green: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --red: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            --bg: #f0f2f5; 
        }
        
        body { font-family: 'Montserrat', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: #2d3436; }
        
        header { 
            background: var(--indigo); 
            color: white; padding: 45px 15px; text-align: center; 
            border-radius: 0 0 50px 50px; box-shadow: 0 15px 35px rgba(118, 75, 162, 0.3);
            margin-bottom: 25px;
        }

        .container { padding: 15px; max-width: 650px; margin: auto; box-sizing: border-box; }

        /* മെനു കാർഡുകൾ */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: -60px; }
        .menu-box {
            background: white; border-radius: 30px; padding: 30px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); cursor: pointer; transition: 0.3s ease;
            position: relative; overflow: hidden; border: none;
        }
        .menu-box:active { transform: scale(0.95); }
        .menu-box h2 { margin: 10px 0 0; font-size: 22px; }
        .box-icon { font-size: 40px; display: block; }
        .taxi-b { border-left: 10px solid #667eea; color: #667eea; }
        .exp-b { border-left: 10px solid #ff0844; color: #ff0844; }
        .rep-b { border-left: 10px solid #43e97b; color: #15803d; }

        /* ഇൻപുട്ട് ഡിസൈൻ */
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 35px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 25px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #b2bec3; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 16px; border: 2px solid #edf2f7; border-radius: 20px; font-size: 16px; box-sizing: border-box; background: #fff; margin-bottom: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: #764ba2; box-shadow: 0 0 10px rgba(118, 75, 162, 0.1); }

        /* ബട്ടണുകൾ */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .btn-save { background: var(--indigo); }
        .btn-back { background: #636e72; margin-top: 15px; }

        .tool-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-tool { flex: 1; padding: 14px; border-radius: 18px; border: none; color: white; font-weight: 700; cursor: pointer; font-size: 12px; }
        .b-print { background: #0984e3; }
        .b-back { background: #6c5ce7; }
        .b-rest { background: #2d3436; }

        /* മാസപ്പടി ബോക്സുകൾ */
        .monthly-master-card { background: white; border-radius: 35px; padding: 25px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        .m-title { text-align: center; font-weight: bold; font-size: 20px; margin-bottom: 20px; color: #2d3436; }
        .mini-box-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .mini-box { padding: 18px 5px; border-radius: 25px; text-align: center; }
        .m-label { font-size: 9px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .m-val { font-size: 14px; font-weight: 900; }

        .g-p { background: #e3fcef; color: #00b894; } 
        .g-e { background: #fff0f0; color: #d63031; } 
        .g-b { background: #eef2ff; color: #3742fa; } 

        .table-wrapper { overflow-x: auto; background: white; border-radius: 25px; border: 1px solid #f1f2f6; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
        th { background: #f9f9ff; padding: 18px; text-align: left; }
        td { padding: 18px; border-bottom: 1px solid #f1f2f6; }

        .hidden { display: none; }

        @media print {
            .no-print, .btn-back, header, .tool-bar { display: none !important; }
            body { background: white; }
            .card { box-shadow: none; border: 1px solid #eee; width: 100% !important; margin: 0; }
            table { font-size: 14px; width: 100%; }
            th, td { border: 1px solid #ddd; padding: 8px; color: black !important; }
        }
    </style>
</head>
<body>

<header class="no-print">
    <h1 style="margin:0; font-size:24px;">Asma's Service Manager</h1>
    <p style="margin:5px 0 0; opacity:0.8; font-size:12px;">Premium Financial Tracker</p>
</header>

<div class="container">
    <div id="homeMenu" class="menu-grid no-print">
        <div class="menu-box taxi-b" onclick="nav('taxiPage')"><span class="box-icon">🚕</span><h2>Taxi Trip</h2></div>
        <div class="menu-box exp-b" onclick="nav('expPage')"><span class="box-icon">🛍️</span><h2>Expense</h2></div>
        <div class="menu-box rep-b" onclick="nav('reportPage')"><span class="box-icon">📊</span><h2>Reports</h2></div>
    </div>

    <div id="taxiPage" class="hidden">
        <div class="card">
            <h3 style="color:#764ba2">🚕 Taxi Trip Entry</h3>
            <input type="hidden" id="t_id">
            <label>Date</label><input type="date" id="t_date">
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Start Time</label><input type="time" id="t_s_time"></div>
                <div style="flex:1"><label>End Time</label><input type="time" id="t_e_time"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Start KM</label><input type="number" id="t_s_km" placeholder="0"></div>
                <div style="flex:1"><label>End KM</label><input type="number" id="t_e_km" placeholder="0"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Fuel (Diesel)</label><input type="number" id="t_fuel" placeholder="0"></div>
                <div style="flex:1"><label>Other Cost</label><input type="number" id="t_other" placeholder="0"></div>
            </div>
            <label>Rate Per KM</label><input type="number" id="t_rate" value="15">
            <button class="btn btn-save" onclick="saveData('TAXI')">Save Entry</button>
            <button class="btn btn-back" onclick="nav('homeMenu')">← Back to Menu</button>
        </div>
    </div>

    <div id="expPage" class="hidden">
        <div class="card">
            <h3 style="color:#ff0844">🛍️ General Expense</h3>
            <input type="hidden" id="e_id">
            <div style="display:flex; gap:10px;">
                <input type="date" id="e_date">
                <input type="time" id="e_time">
            </div>
            <label>Item Name</label><input type="text" id="e_cat" placeholder="e.g. Food, Shopping">
            <label>Amount</label><input type="number" id="e_amt" placeholder="0">
            <button class="btn" style="background:var(--red)" onclick="saveData('EXPENSE')">Save Expense</button>
            <button class="btn btn-back" onclick="nav('homeMenu')">← Back to Menu</button>
        </div>
    </div>

    <div id="reportPage" class="hidden">
        <div class="card no-print">
            <label>Date Range Filter</label>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="date" id="f_from" onchange="render()">
                <input type="date" id="f_to" onchange="render()">
            </div>
            <div class="tool-bar">
                <button class="btn-tool b-print" onclick="window.print()">🖨️ Print</button>
                <button class="btn-tool b-back" onclick="exportData()">💾 Backup</button>
                <button class="btn-tool b-rest" onclick="document.getElementById('impF').click()">📂 Restore</button>
            </div>
            <input type="file" id="impF" class="hidden" onchange="importData(event)">
        </div>

        <div class="table-wrapper card">
            <table>
                <thead>
                    <tr><th>Date/Time</th><th>Type</th><th>KM</th><th>Fuel/Exp</th><th>Profit</th><th class="no-print">Action</th></tr>
                </thead>
                <tbody id="reportTbody"></tbody>
            </table>
            <button class="btn btn-back no-print" onclick="nav('homeMenu')">← Back to Menu</button>
        </div>

        <div id="monthlyStats"></div>
    </div>
</div>

<script>
    const KEY = 'asma_v14_ultra_gold';
    
    window.onload = () => { 
        const d = new Date().toISOString().split('T')[0];
        const t = new Date().toLocaleTimeString('en-GB', {hour12: false}).substring(0, 5);
        ['t_date','e_date','f_from','f_to'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = d; });
        ['t_s_time','t_e_time','e_time'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = t; });
        render(); 
    };

    function nav(id) {
        ['homeMenu', 'taxiPage', 'expPage', 'reportPage'].forEach(p => document.getElementById(p).classList.toggle('hidden', p !== id));
        if(id === 'reportPage') render();
    }

    function saveData(type) {
        let list = JSON.parse(localStorage.getItem(KEY)) || [];
        const id = type === 'TAXI' ? document.getElementById('t_id').value : document.getElementById('e_id').value;
        let d = { id: id ? parseInt(id) : Date.now(), type: type };

        if(type === 'TAXI') {
            const sk = parseFloat(document.getElementById('t_s_km').value)||0;
            const ek = parseFloat(document.getElementById('t_e_km').value)||0;
            const f = parseFloat(document.getElementById('t_fuel').value)||0;
            const o = parseFloat(document.getElementById('t_other').value)||0;
            const r = parseFloat(document.getElementById('t_rate').value)||0;
            const km = ek - sk;
            Object.assign(d, { 
                date: document.getElementById('t_date').value, s_time: document.getElementById('t_s_time').value, 
                e_time: document.getElementById('t_e_time').value, s_km: sk, e_km: ek, km: km, 
                fuel: f, other: o, rate: r, exp: f+o, profit: (km*r)-(f+o) 
            });
        } else {
            const amt = parseFloat(document.getElementById('e_amt').value)||0;
            Object.assign(d, { date: document.getElementById('e_date').value, time: document.getElementById('e_time').value, cat: document.getElementById('e_cat').value, exp: amt, profit: 0 });
        }

        if(id) list = list.filter(i => i.id !== parseInt(id));
        list.push(d); 
        localStorage.setItem(KEY, JSON.stringify(list));
        alert("വിവരങ്ങൾ സേവ് ചെയ്തു!"); 
        location.reload();
    }

    function render() {
        const list = JSON.parse(localStorage.getItem(KEY)) || [];
        const from = document.getElementById('f_from').value;
        const to = document.getElementById('f_to').value;
        const body = document.getElementById('reportTbody');
        const mDiv = document.getElementById('monthlyStats');
        body.innerHTML = ''; mDiv.innerHTML = '';

        let monthly = {};
        list.sort((a,b) => new Date(b.date + ' ' + (b.s_time || b.time)) - new Date(a.date + ' ' + (a.s_time || a.time))).reverse().forEach(i => {
            let mKey = i.date.substring(0, 7); 
            if(!monthly[mKey]) monthly[mKey] = { p: 0, e: 0 };
            if(i.type === 'TAXI') { monthly[mKey].p += i.profit; } else { monthly[mKey].e += i.exp; }

            if(i.date >= from && i.date <= to) {
                const timeStr = i.type==='TAXI' ? `${i.s_time}-${i.e_time}` : i.time;
                body.innerHTML += `<tr>
                    <td>${i.date.split('-').reverse().join('/')}<br><small style="color:#6c5ce7">${timeStr}</small></td>
                    <td><b>${i.type==='TAXI'?'Taxi':i.cat}</b></td>
                    <td>${i.type==='TAXI'?i.km:'-'}</td>
                    <td style="color:#d63031">₹${i.exp}</td>
                    <td style="color:${i.profit > 0 ? '#00b894':'#2d3436'}">₹${i.type==='TAXI'?i.profit:'0'}</td>
                    <td class="no-print"><span style="color:blue" onclick="editItem(${i.id})">Edit</span> | <span style="color:red" onclick="delItem(${i.id})">Del</span></td>
                </tr>`;
            }
        });

        Object.keys(monthly).sort().reverse().forEach(m => {
            const mName = new Date(m + "-01").toLocaleString('default', { month: 'long', year: 'numeric' });
            mDiv.innerHTML += `
                <div class="monthly-master-card">
                    <div class="m-title">📅 ${mName}</div>
                    <div class="mini-box-grid">
                        <div class="mini-box g-p"><span class="m-label">Profit</span><span class="m-val">₹${monthly[m].p}</span></div>
                        <div class="mini-box g-e"><span class="m-label">Expense</span><span class="m-val">₹${monthly[m].e}</span></div>
                        <div class="mini-box g-b"><span class="m-label">Balance</span><span class="m-val">₹${monthly[m].p - monthly[m].e}</span></div>
                    </div>
                </div>`;
        });
    }

    function editItem(id) {
        const item = (JSON.parse(localStorage.getItem(KEY)) || []).find(i => i.id === id);
        if(!item) return;
        if(item.type === 'TAXI') {
            nav('taxiPage'); document.getElementById('t_id').value = item.id; document.getElementById('t_date').value = item.date;
            document.getElementById('t_s_time').value = item.s_time; document.getElementById('t_e_time').value = item.e_time;
            document.getElementById('t_s_km').value = item.s_km; document.getElementById('t_e_km').value = item.e_km;
            document.getElementById('t_fuel').value = item.fuel; document.getElementById('t_other').value = item.other;
            document.getElementById('t_rate').value = item.rate;
        } else {
            nav('expPage'); document.getElementById('e_id').value = item.id; document.getElementById('e_date').value = item.date;
            document.getElementById('e_time').value = item.time; document.getElementById('e_cat').value = item.cat;
            document.getElementById('e_amt').value = item.exp;
        }
    }

    function delItem(id) { if(confirm("Delete item?")) { let list = JSON.parse(localStorage.getItem(KEY)) || []; localStorage.setItem(KEY, JSON.stringify(list.filter(i => i.id !== id))); render(); } }

    function exportData() {
        try {
            const data = localStorage.getItem(KEY);
            if (!data || data === "[]") {
                alert("ബാക്കപ്പ് എടുക്കാൻ ഡാറ്റ ഒന്നുമില്ല!");
                return;
            }
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Asma_Service_Backup_${new Date().toLocaleDateString().replace(/\//g,'-')}.json`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        } catch (err) {
            alert("ബാക്കപ്പ് എടുക്കുന്നതിൽ പിശക്: " + err);
        }
    }

    function importData(e) {
        const r = new FileReader();
        r.onload = (x) => { 
            try {
                JSON.parse(x.target.result); // Validate JSON
                localStorage.setItem(KEY, x.target.result); 
                render(); 
                alert("Data Restored Successfully!"); 
            } catch(e) {
                alert("ഈ ഫയൽ സപ്പോർട്ട് ചെയ്യുന്നില്ല!");
            }
        };
        r.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
